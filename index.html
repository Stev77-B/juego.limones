<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Atrapar Limones</title>
  <link rel="stylesheet" href="limones.css">
  <script src="utils.js"></script>
</head>

<body onload="iniciar();">
  <div class="contenedor">

    <header class="encabezado">
      <h1>🍋 Atrapar Limones</h1>
      <p class="frase">Si del cielo te caen limones... ¡atrápalos!</p>
      <h2 class="autor">Autor: Steven Castañeda</h2>
    </header>

    <section class="juego">
      <canvas id="areaJuego" width="600" height="400"></canvas>
    </section>

    <section class="panel">
      <div class="card">
        <p>Puntaje</p>
        <span id="txtPuntaje">0</span>
      </div>

      <div class="card">
        <p>Vidas</p>
        <span id="txtVidas">3</span>
      </div>
    </section>

    <section class="botones">
      <button onclick="moverIzquierda()">⬅ Izquierda</button>
      <button onclick="moverDerecha()">Derecha ➡</button>
      <button>🔄 Reiniciar</button>
    </section>

  </div>

  <script src="limones.js"></script>
</body>
</html>
